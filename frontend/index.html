<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LLM-ETL · Natural-Language Query</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; max-width: 760px; margin: 3rem auto;
         padding: 0 1rem; }
  h1 { font-size: 1.4rem; }
  .card { border: 1px solid color-mix(in srgb, currentColor 18%, transparent);
          border-radius: 12px; padding: 1rem 1.25rem; margin: 1rem 0; }
  input { width: 100%; padding: .7rem .9rem; font-size: 1rem; border-radius: 8px;
          border: 1px solid color-mix(in srgb, currentColor 30%, transparent);
          background: transparent; color: inherit; }
  button { margin-top: .6rem; padding: .55rem 1.1rem; font-size: .95rem;
           border-radius: 8px; border: 0; background: #4f46e5; color: #fff;
           cursor: pointer; }
  pre { background: color-mix(in srgb, currentColor 8%, transparent);
        padding: .9rem; border-radius: 8px; overflow-x: auto; }
  .hint { opacity: .7; font-size: .85rem; }
  .chips button { background: color-mix(in srgb, currentColor 12%, transparent);
                  color: inherit; margin: .2rem .3rem .2rem 0; padding: .35rem .7rem; }
</style>
</head>
<body>
  <h1>LLM-ETL · Ask your data</h1>
  <p class="hint">The question is compiled by the LLM into a small query plan, then
    executed deterministically in pandas — the model never renders this page and
    never sees the rows per request.</p>

  <div class="card">
    <input id="q" placeholder="e.g. Show me the top 3 by amount"
           value="Show me the top 3 by amount" />
    <div class="chips" id="chips"></div>
    <button onclick="ask()">Ask</button>
  </div>

  <div class="card">
    <strong>Result</strong>
    <pre id="out">—</pre>
  </div>

<script>
  const examples = [
    "How many customers are there?",
    "What is the average amount?",
    "Show me the top 3 by amount",
    "Group customers by country",
  ];
  const chips = document.getElementById("chips");
  examples.forEach(e => {
    const b = document.createElement("button");
    b.textContent = e;
    b.onclick = () => { document.getElementById("q").value = e; ask(); };
    chips.appendChild(b);
  });

  async function ask() {
    const question = document.getElementById("q").value;
    const out = document.getElementById("out");
    out.textContent = "…";
    try {
      const res = await fetch("/query", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question }),
      });
      out.textContent = JSON.stringify(await res.json(), null, 2);
    } catch (err) {
      out.textContent = "Error: " + err;
    }
  }
</script>
</body>
</html>
